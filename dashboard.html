<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GéoSchool - Tableau de Bord</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f0f2f5; }
        .sidebar { width: 250px; background: #2c3e50; color: white; height: 100vh; padding: 20px; position: fixed; }
        .main-content { margin-left: 290px; padding: 40px; width: 100%; }
        .card-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card h3 { margin: 0; color: #7f8c8d; font-size: 14px; }
        .card p { font-size: 32px; font-weight: bold; margin: 10px 0; color: #2980b9; }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; margin-top: 20px; border-radius: 5px; }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>GéoSchool</h2>
    <hr>
    <p>Menu</p>
    <nav>
        <div style="margin-bottom: 10px;">📊 Tableau de bord</div>
        <div style="margin-bottom: 10px;">👥 Élèves</div>
        <div style="margin-bottom: 10px;">👨‍🏫 Professeurs</div>
        <div style="margin-bottom: 10px;">🏫 Classes</div>
    </nav>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
</div>

<div class="main-content">
    <h1 id="welcome">Chargement...</h1>
    <p>Voici l'état actuel de votre établissement :</p>

    <div class="card-container">
        <div class="card">
            <h3>Élèves Inscrits</h3>
            <p id="count-students">0</p>
        </div>
        <div class="card">
            <h3>Classes actives</h3>
            <p id="count-classes">0</p>
        </div>
        <div class="card">
            <h3>Professeurs</h3>
            <p id="count-profs">0</p>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://dztbxntfsouuyrrigaah.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_lNctOhdEyESJGitYGXDsqA_rNLhHNBe';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        
        if (!user) {
            window.location.href = "index.html";
        } else {
            // Récupérer les infos du profil
            let { data: profile } = await supabase
                .from('profiles')
                .select('nom, prenom')
                .eq('id', user.id)
                .single();
            
            document.getElementById('welcome').innerText = `Bienvenue, ${profile.prenom || 'Administrateur'} !`;
            loadStats();
        }
    }

    async function loadStats() {
        // On compte les élèves (exemple de requête Supabase)
        const { count: studentCount } = await supabase.from('students').select('*', { count: 'exact', head: true });
        const { count: classCount } = await supabase.from('classes').select('*', { count: 'exact', head: true });
        
        document.getElementById('count-students').innerText = studentCount || 0;
        document.getElementById('count-classes').innerText = classCount || 0;
    }

    async function logout() {
        await supabase.auth.signOut();
        window.location.href = "index.html";
    }

    checkUser();
</script>

</body>
</html>

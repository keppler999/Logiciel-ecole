<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GéoSchool - Connexion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2d3436; text-align: center; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dfe6e9; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0984e3; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        button:hover { background: #74b9ff; }
        .msg { text-align: center; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>GéoSchool</h2>
    <input type="email" id="email" placeholder="Email (ex: admin@ecole.com)">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <div id="message" class="msg"></div>
</div>

<script>
    // Configuration de ta base de données
    const SUPABASE_URL = 'https://dztbxntfsouuyrrigaah.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_lNctOhdEyESJGitYGXDsqA_rNLhHNBe';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        messageDiv.innerText = "Connexion en cours...";

        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Erreur : " + error.message;
        } else {
            messageDiv.style.color = "green";
            messageDiv.innerText = "Succès ! Redirection...";
            // Nous créerons la page dashboard.html à l'étape suivante
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
        }
    }
</script>

</body>
</html>

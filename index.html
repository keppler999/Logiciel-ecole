<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - Scholarite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <h1 id="form-title">Créer un compte</h1>
            <p id="form-subtitle">Rejoignez l'écosystème Scholarite</p>

            <form id="auth-form">
                <div class="input-group" id="name-field">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" placeholder="Ex: Jean Mukendi">
                </div>

                <div class="input-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" placeholder="nom@exemple.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" id="main-btn">Créer</button>
            </form>

            <div class="footer-links">
                <p id="toggle-text">Déjà un compte ?</p>
                <button class="btn-secondary" id="toggle-btn">Se connecter</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

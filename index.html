<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GéoSchool - Accès</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2d3436; text-align: center; margin-bottom: 1.5rem; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dfe6e9; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0984e3; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #74b9ff; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; color: #0984e3; cursor: pointer; }
        #message { text-align: center; font-size: 14px; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container" id="auth-form">
    <h2 id="form-title">Connexion GéoSchool</h2>
    
    <div id="register-fields" style="display: none;">
        <input type="text" id="nom" placeholder="Nom">
        <input type="text" id="prenom" placeholder="Prénom">
    </div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    
    <button id="main-btn" onclick="handleAuth()">Se connecter</button>
    
    <p class="toggle-link" id="toggle-text" onclick="toggleMode()">Pas encore de compte ? S'inscrire</p>
    <div id="message"></div>
</div>

<script>
    const SUPABASE_URL = 'https://dztbxntfsouuyrrigaah.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_lNctOhdEyESJGitYGXDsqA_rNLhHNBe';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('form-title').innerText = isLoginMode ? "Connexion GéoSchool" : "Inscription Admin";
        document.getElementById('register-fields').style.display = isLoginMode ? "none" : "block";
        document.getElementById('main-btn').innerText = isLoginMode ? "Se connecter" : "Créer mon compte Admin";
        document.getElementById('toggle-text').innerText = isLoginMode ? "Pas encore de compte ? S'inscrire" : "Déjà un compte ? Se connecter";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('message');
        
        msg.innerText = "Traitement en cours...";
        msg.style.color = "black";

        if (isLoginMode) {
            // CONNEXION
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) { msg.style.color = "red"; msg.innerText = error.message; }
            else { window.location.href = "dashboard.html"; }
        } else {
            // INSCRIPTION
            const nom = document.getElementById('nom').value;
            const prenom = document.getElementById('prenom').value;

            // 1. Création de l'utilisateur dans l'Auth
            const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });
            
            if (authError) {
                msg.style.color = "red";
                msg.innerText = authError.message;
                return;
            }

            if (authData.user) {
                // 2. Création du profil dans la table 'profiles'
                const { error: profileError } = await supabase.from('profiles').insert([
                    { id: authData.user.id, nom: nom, prenom: prenom, role: 'admin' }
                ]);

                if (profileError) {
                    msg.style.color = "red";
                    msg.innerText = "Erreur profil : " + profileError.message;
                } else {
                    msg.style.color = "green";
                    msg.innerText = "Compte créé ! Connectez-vous maintenant.";
                    toggleMode();
                }
            }
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarite - Créer un compte</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-container">
        <div class="glass-card">
            <h1 id="form-title">Créer un compte</h1>
            
            <form id="scholarite-form">
                <div class="input-group" id="group-nom">
                    <label for="nom">Nom complet</label>
                    <input type="text" id="nom" placeholder="Votre nom...">
                </div>

                <div class="input-group" id="group-email">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" placeholder="votre@email.com">
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>

                <div class="button-container">
                    <button type="submit" id="btn-main" class="btn-3d primary">Créer</button>
                    <button type="button" id="btn-switch" class="btn-3d secondary">Se connecter</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
